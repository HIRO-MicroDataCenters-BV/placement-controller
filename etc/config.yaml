k8s:
  incluster: true
  timeout_seconds: 3600

placement:
  namespace: test
  available_zones:
    - zone1
    - zone2

  current_zone: "zone1"

  static_controller_endpoints: {}

  application_controller_endpoint:

orchestrationlib:
  enabled: true
  base_url: http://127.0.0.1/

api:
  port: 8001

prometheus:
  endpoint_port: 8085

prometheus_client:
  endpoint: http://localhost:9090

metrics:
  static_metrics:
    - metric: cost
      value_per_unit:
        cpu: 1.0
        memory: 0.000000003
        storage: 0.000000001
        gpu: 3.0
        ephemeral-storage: 0.000000001
      weight:
        cpu: 1.0
        memory: 1.0
        storage: 1.0
        gpu: 1.0
        ephemeral-storage: 1.0
      method: weighted_average

  # Optional: Prometheus-based metrics (overrides static values when available)
  # Can be mixed with static_metrics - static provides defaults, Prometheus provides live data
  prometheus_metrics:
    - metric: cost
      query: cloud_cost
      labels:
        source: cloud
    - metric: energy
      query: energy_cost
      labels:
        source: energy

      # Optional: default value if Prometheus returns no data
      # default_value: 0.5
